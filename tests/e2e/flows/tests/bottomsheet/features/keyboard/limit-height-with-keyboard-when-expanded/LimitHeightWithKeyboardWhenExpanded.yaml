appId: com.jaf.matos.testing
--- 
- pressKey: Home
- clearState

- runScripts: ./script.js

- openLink: ${output.url}

- extendedWaitUntil:
    visible: 
      id: "button_open-sheet"
    timeout: 10000

- tapOn: 
    id: "button_open-sheet"

- waitForAnimationToEnd

- tapOn: 
    id: "form-input_description"

- waitForAnimationToEnd

- swipe:
    start: 90%, 50%
    end: 90%, 35%
    duration: 400

- waitForAnimationToEnd

- assertScreenshot:
    path: ${SCREENSHOTS_DIR}/baselines/bottomsheet-expanded-600h-with-keyboard
    cropOn: 
      id: "bottomsheet"
    thresholdPercentage: 98
