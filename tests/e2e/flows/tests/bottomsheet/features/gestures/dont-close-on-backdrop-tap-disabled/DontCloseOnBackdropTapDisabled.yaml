appId: com.jaf.matos.testing
---
- pressKey: Home
- clearState

- runScript: ./setup.js

- openLink: ${output.url}

- extendedWaitUntil:
    visible:
      id: "button_open-sheet"
    timeout: 10000

- assertNotVisible:
    id: "bottomsheet"

- tapOn:
    id: "button_open-sheet"

- assertVisible:
    id: "bottomsheet"

- tapOn:
    id: "bottomsheet-backdrop"

- assertVisible:
    id: "bottomsheet"
