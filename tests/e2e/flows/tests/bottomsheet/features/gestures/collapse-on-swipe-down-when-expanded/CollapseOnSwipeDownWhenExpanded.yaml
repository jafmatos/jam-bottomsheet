appId: com.jaf.matos.testing
---
- pressKey: Home
- clearState

- runScript: ./setup.js

- openLink: ${output.url}

- extendedWaitUntil:
    visible:
      id: "button_open-sheet"
    timeout: 10000

- tapOn:
    id: "button_open-sheet"

- assertVisible:
    id: "bottomsheet"

- swipe:
    start: 90%, 50%
    end: 90%, 35%
    duration: 400

- waitForAnimationToEnd

- swipe:
    start: 90%, 50%
    end: 90%, 65%
    duration: 400

- waitForAnimationToEnd

- assertScreenshot:
    path: ${SCREENSHOTS_DIR}/baselines/bottomsheet-collapsed-400h-empty.png
    cropOn:
      id: bottomsheet
    thresholdPercentage: 98
