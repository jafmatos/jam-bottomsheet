appId: com.jaf.matos.testing
---
- pressKey: Home
- clearState

- runScript: ./setup.js

- openLink: ${output.url}

- extendedWaitUntil:
    visible:
      id: "button_open-sheet"
    timeout: 10000

- tapOn:
    id: "button_open-sheet"

- swipe:
    start: 90%, 50%
    end: 90%, 35%
    duration: 400

- waitForAnimationToEnd

# - takeScreenshot:
#     path: ${SCREENSHOTS_DIR}/baselines/bottomsheet-collapsed-400h
#     cropOn:
#       id: "bottomsheet"

- assertScreenshot:
    path: ${SCREENSHOTS_DIR}/baselines/bottomsheet-collapsed-400h.png
    cropOn:
      id: bottomsheet
    thresholdPercentage: 98
