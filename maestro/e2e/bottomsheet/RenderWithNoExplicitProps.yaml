appId: com.example
---
- openLink: exp://192.168.1.10:8081
# Tap whatever opens the bottom sheet
- tapOn:
    id: 'button_open-sheet'

- extendedWaitUntil:
    visible: "Bottomsheet content"
    timeout: 10000


# Assert bottom sheet is visible
# - assertVisible:
#     id: "bottomsheet"
- assertVisible: 'Bottomsheet content'

# Optional: verify backdrop is visible too
- assertVisible:
    id: 'bottomsheet-backdrop'

# Optional: interact inside the sheet to ensure it's usable
- tapOn:
    id: 'bottomsheet-scroll-view'

- stopApp
